<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathruCare | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 6rem;
            position: relative;
            z-index: 10;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.8);
            transform: translateY(0);
            transition: transform 0.3s;
        }
        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(79, 140, 255, 0.2);
        }
        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header h2 { color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-light); }
        .auth-link { color: var(--primary); font-weight: 600; text-decoration: none; transition: color 0.3s; }
        .auth-link:hover { color: var(--primary-hover); }
    </style>
</head>
<body>

    <!-- STICKY NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <a href="index.html" style="text-decoration: none; color: inherit;">MathruCare</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="medicines.html">Medicines</a></li>
            <li><a href="doctors.html">Doctors</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
    </nav>

    <div class="auth-container fade-in">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to access your dashboard.</p>
            </div>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-input" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-light); font-weight: 500;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="auth-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Secure Login</button>
            </form>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-light); font-size: 0.95rem;">
                Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Background Animation handled globally by style.css body::before -->

    <script src="js/app.js"></script>
</body>
</html>
